<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" width="920" height="200">
  <title>Engineering loop</title>
  <desc>Five stages: Frame, Shape, Build, Integrate, Operate, with feedback to Frame.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5eead4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="200" fill="url(#bg)"/>
  <!-- Row: five 130px cards, 25px gaps ? 750px wide; centered in 920 ? x0 = 85 -->
  <path d="M 215 88 L 239 88" fill="none" stroke="#5eead4" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 370 88 L 394 88" fill="none" stroke="#5eead4" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 525 88 L 549 88" fill="none" stroke="#5eead4" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 680 88 L 704 88" fill="none" stroke="#5eead4" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 770 128 Q 460 188 150 128" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="8 6" opacity="0.95"/>
  <text x="460" y="178" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">feedback</text>
  <rect x="85" y="48" width="130" height="80" rx="10" fill="#0f3d3e" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="150" y="78" fill="#ecfdf5" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1&#183; Frame</text>
  <text x="150" y="100" fill="#99f6e4" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">SLOs&#183; risk</text>
  <rect x="240" y="48" width="130" height="80" rx="10" fill="#115e59" stroke="#5eead4" stroke-width="1.5"/>
  <text x="305" y="78" fill="#ecfdf5" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2&#183; Shape</text>
  <text x="305" y="100" fill="#99f6e4" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">APIs&#183; contracts</text>
  <rect x="395" y="48" width="130" height="80" rx="10" fill="#134e4a" stroke="#5eead4" stroke-width="1.5"/>
  <text x="460" y="78" fill="#ecfdf5" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">3&#183; Build</text>
  <text x="460" y="100" fill="#99f6e4" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">TDD&#183; review</text>
  <rect x="550" y="48" width="130" height="80" rx="10" fill="#0f766e" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="615" y="78" fill="#042f2e" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">4&#183; Integrate</text>
  <text x="615" y="100" fill="#042f2e" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">ML&#183; agents</text>
  <rect x="705" y="48" width="130" height="80" rx="10" fill="#0d1117" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="770" y="78" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">5&#183; Operate</text>
  <text x="770" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">traffic&#183; metrics</text>
</svg>
